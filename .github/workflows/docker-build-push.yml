# ==========================================
# GitHub Actions Workflow: Build & Push Docker Image
# 
# WHAT THIS DOES:
# - On every push to 'main' branch → Builds Docker image
# - Tags it with: 'latest', commit SHA, branch name
# - Pushes to GitHub Container Registry (free!)
# - Optionally pushes to Docker Hub (if configured)
#
# BENEFITS:
# - No manual building/pushing
# - Every code change has a ready-to-deploy image
# - Easy rollback to any previous version
# - Team always has latest image
# ==========================================

name: Build & Push Docker Image

# ==========================================
# TRIGGERS: When should this workflow run?
# ==========================================
on:
  # Run when pushing to main branch
  push:
    branches: [ main, master ]
    # Only run if these files changed (optional optimization)
    paths:
      - 'src/**'
      - 'package*.json'
      - 'next.config.*'
      - 'Dockerfile'
      - '.github/workflows/docker-build-push.yml'
  
  # Run on pull requests (builds but doesn't push)
  pull_request:
    branches: [ main, master ]
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to registry?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# ==========================================
# ENVIRONMENT VARIABLES
# ==========================================
env:
  # GitHub Container Registry (free for public repos)
  REGISTRY: ghcr.io
  # Your GitHub username/org (automatically set by GitHub)
  IMAGE_NAME: ${{ github.repository }}

# ==========================================
# JOBS: The tasks to run
# ==========================================
jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    
    # Permissions needed for GitHub Container Registry
    permissions:
      contents: read
      packages: write
      
    steps:
      # ------------------------------------------
      # STEP 1: Checkout your code
      # ------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------
      # STEP 2: Set up Docker Buildx (for caching & multi-platform builds)
      # ------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------
      # STEP 3: Login to GitHub Container Registry (GHCR)
      # ------------------------------------------
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------
      # STEP 4: Extract metadata for Docker tags
      # Creates tags like: latest, v1.0.0, main, sha-abc123
      # ------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ------------------------------------------
      # STEP 5: Build and push Docker image
      # ------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable layer caching for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments
          build-args: |
            NODE_ENV=production

      # ------------------------------------------
      # STEP 6: Output the image URL
      # ------------------------------------------
      - name: Output image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "📦 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🔗 View packages: https://github.com/${{ github.repository }}/packages"
