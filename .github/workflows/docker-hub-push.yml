# ==========================================
# Alternative: Push to Docker Hub instead of GitHub Container Registry
# 
# SETUP REQUIRED:
# 1. Create Docker Hub account: https://hub.docker.com
# 2. Create repository on Docker Hub
# 3. Go to GitHub → Settings → Secrets and variables → Actions
# 4. Add these secrets:
#    - DOCKERHUB_USERNAME: Your Docker Hub username
#    - DOCKERHUB_TOKEN: Create at https://hub.docker.com/settings/security
#
# To use this instead of GHCR, rename this file and disable the other one
# ==========================================

name: Build & Push to Docker Hub

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  # Change this to your Docker Hub username and repo name
  DOCKER_IMAGE: your-dockerhub-username/lexiassist-frontend

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub (requires secrets setup)
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Pushed to Docker Hub!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:latest"
